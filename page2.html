<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颜色练习 - 我的第一个页面</title>
    <style>
        /* 设置一级标题的文字颜色为红色 */
        h1 {
            color: rgb(135, 158, 244);
        }
        /* 设置段落的文字颜色为绿色 */
        p {
            color: rgb(166, 240, 253);
        }
    </style>
</head>
<body>
    <h1>我的名字</h1>
    <p>我喜欢编程</p>
</body>
</html>
